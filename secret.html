<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memorial | Mr. Bill</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;700&family=Playfair+Display:ital,wght@1,400;1,600&display=swap" rel="stylesheet">
  <style>
    :root {
      --deep-midnight: #02050d;
      --ritual-gold: #d6b05f;
      --flame-glow: rgba(214, 176, 95, 0.3);
      --text-ghost: #b0b8c4;
      --aurora-blue: rgba(18, 45, 99, 0.4);
      --aurora-gold: rgba(214, 176, 95, 0.15);
      --card-bg: rgba(255,255,255,0.03);
    }

    * { box-sizing: border-box; }

    body {
      background: var(--deep-midnight);
      color: var(--text-ghost);
      font-family: 'Inter', sans-serif;
      margin: 0;
      min-height: 100vh;
      line-height: 1.6;
      overflow-x: hidden;
    }

    #cursorCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    #emberContainer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .ember {
      position: absolute;
      bottom: -10px;
      background: var(--ritual-gold);
      border-radius: 50%;
      box-shadow: 0 0 12px var(--ritual-gold), 0 0 20px white;
      animation: floatUp linear forwards;
      opacity: 0;
      will-change: transform, opacity;
    }

    @keyframes floatUp {
      0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
      50% { opacity: 0.8; }
      100% { transform: translateY(-110vh) scale(0) rotate(360deg); opacity: 0; }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .scroll-animate {
      opacity: 0;
    }

    .scroll-animate.animate-fade-up {
      animation: fadeInUp 0.8s ease-out forwards;
    }

    .scroll-animate.animate-scale {
      animation: scaleIn 0.8s ease-out forwards;
    }

    .memorial-container {
      position: relative;
      z-index: 10;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    .memorial-center {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
    }

    .decoration-group {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
    }

    .memorial-aurora {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      border-radius: 8px;
      pointer-events: none;
      background: radial-gradient(
        ellipse at center,
        rgba(214, 176, 95, 0.4) 0%,
        rgba(176, 184, 196, 0.2) 25%,
        rgba(255, 255, 255, 0.1) 50%,
        rgba(0, 40, 60, 0.15) 75%,
        transparent 100%
      );
      animation: auroraGlow 3s infinite ease-in-out;
    }

    @keyframes auroraGlow {
      0%, 100% {
        opacity: 0.3;
        box-shadow: 0 0 20px rgba(214, 176, 95, 0.3), inset 0 0 20px rgba(0, 40, 60, 0.1);
      }
      50% {
        opacity: 0.8;
        box-shadow: 0 0 60px rgba(214, 176, 95, 0.6), inset 0 0 40px rgba(176, 184, 196, 0.3), 0 0 80px rgba(0, 40, 60, 0.2);
      }
    }

    .headmaster-frame {
      width: 280px;
      height: 380px;
      background: linear-gradient(180deg, rgba(214,176,95,0.1) 0%, rgba(255,255,255,0) 100%);
      border: 3px solid var(--ritual-gold);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(214, 176, 95, 0.3), inset 0 0 20px rgba(0,0,0,0.5);
      position: relative;
      overflow: visible;
    }

    .headmaster-frame::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(214,176,95,0.2) 0%, transparent 50%);
      pointer-events: none;
    }

    .placeholder-text {
      color: var(--ritual-gold);
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-align: center;
      opacity: 0.6;
    }

    .memorial-title {
      text-align: center;
      margin-top: 60px;
      font-family: 'Cinzel', serif;
      color: var(--ritual-gold);
      letter-spacing: 4px;
      font-size: 1.8rem;
    }

    .memorial-subtitle {
      text-align: center;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--text-ghost);
      opacity: 0.7;
      margin-top: 10px;
      font-size: 1rem;
    }

    .back-link {
      position: fixed;
      top: 30px;
      left: 30px;
      color: var(--ritual-gold);
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      letter-spacing: 2px;
      border: 1px solid var(--ritual-gold);
      padding: 10px 20px;
      border-radius: 999px;
      transition: 0.3s;
      z-index: 100;
    }

    .back-link:hover {
      background: var(--ritual-gold);
      color: var(--deep-midnight);
    }

    @media (max-width: 768px) {
      .candle-left, .candle-right {
        display: none;
      }

      .roses-left, .roses-right {
        display: none;
      }

      .headmaster-frame {
        width: 220px;
        height: 300px;
      }

      .memorial-title {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Return</a>

  <canvas id="cursorCanvas"></canvas>
  <div id="emberContainer"></div>

  <div class="memorial-container">
    <div class="memorial-center" id="memorialCenter">
      <div id="decorationsContainer"></div>

      <div class="headmaster-frame scroll-animate animate-scale">
        <div class="memorial-aurora"></div>
        <img src="headmaster.jpg" alt="Headmaster" style="width: 100%; height: 100%; object-fit: cover; border-radius: 5px;">
      </div>

      <h1 class="memorial-title scroll-animate animate-fade-up">We Will Remember You</h1>
      <p class="memorial-subtitle scroll-animate animate-fade-up">A legacy that will endure</p>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('cursorCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    let particlesArray = [];
    const mouse = { x: null, y: null };

    window.addEventListener('mousemove', (event) => {
      mouse.x = event.x;
      mouse.y = event.y;
      if (particlesArray.length < 350) {
        particlesArray.push(new Particle());
      }
    });

    class Particle {
      constructor() {
        this.x = mouse.x;
        this.y = mouse.y;
        this.size = Math.random() * 4 + 1;
        this.speedX = Math.random() * 2 - 1;
        this.speedY = Math.random() * 2 - 1;
        const colors = ['214, 176, 95', '176, 184, 196', '255, 255, 255', '0, 40, 60'];
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        this.color = `rgba(${randomColor}, ${Math.random() * 0.8 + 0.2})`;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.size > 0.1) this.size -= 0.05;
      }
      draw() {
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < particlesArray.length; i++) {
        particlesArray[i].update();
        particlesArray[i].draw();
        if (particlesArray[i].size <= 0.2) {
          particlesArray.splice(i, 1);
          i--;
        }
      }
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    function spawnEmber() {
      const container = document.getElementById('emberContainer');
      const ember = document.createElement('div');
      ember.className = 'ember';
      ember.style.left = Math.random() * 100 + 'vw';
      const size = Math.random() * 4 + 2;
      ember.style.width = size + 'px';
      ember.style.height = size + 'px';
      ember.style.animationDuration = (Math.random() * 5 + 4) + 's';
      ember.style.marginLeft = (Math.random() * 50 - 25) + 'px';
      container.appendChild(ember);
      ember.addEventListener('animationend', () => ember.remove());
    }
    setInterval(spawnEmber, 50);

    document.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'b') {
        window.location.href = "index.html";
      }
    });

    // Scroll animations with Intersection Observer
    const observerOptions = {
      threshold: 0.1,
      rootMargin: '0px 0px -100px 0px'
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('animate-fade-up', 'animate-scale');
          observer.unobserve(entry.target);
        }
      });
    }, observerOptions);

    document.querySelectorAll('.scroll-animate').forEach(el => {
      observer.observe(el);
    });
  </script>
</body>
</html>
